name: Publish Docker image (Multi-arch)

on:
  push:
    branches:
      - main-fork
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      sha: ${{ steps.version.outputs.sha }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image name (lowercase for GHCR)
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Resolve version & write VERSION
        id: version
        run: |
          SHA_SHORT=${GITHUB_SHA:0:7}
          echo "SHA_SHORT=${SHA_SHORT}" >> $GITHUB_ENV
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "${SHA_SHORT}" > VERSION
          echo "Building sha: ${SHA_SHORT} for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHA_SHORT }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-fork-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Set version
        run: |
          echo "SHA_SHORT=${{ needs.build_single_arch.outputs.sha }}" >> $GITHUB_ENV

      - name: Resolve image name (lowercase for GHCR)
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (sha)
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}-arm64

      - name: Create & push manifest (main-fork)
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-fork \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-fork-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-fork-arm64

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
